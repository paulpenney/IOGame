<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arena · Classroom IO Game</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page arena-page">
    <header class="arena-header">
      <h1>Arena</h1>
      <div id="status" class="status">disconnected</div>
      <a class="back" href="/">&larr; Home</a>
    </header>

    <div class="arena-grid">
      <canvas id="game" width="1200" height="800"></canvas>
      <aside class="panel scoreboard">
        <h2>Players</h2>
        <ol id="scoreboard"></ol>
        <h2>Controls</h2>
        <ul class="tips">
          <li><code>WASD</code> / arrow keys – move</li>
          <li>Power key (e.g. <code>space</code>) – fire</li>
        </ul>
      </aside>
    </div>
  </main>

  <script src="/static/game_client.js"></script>
</body>
</html>
